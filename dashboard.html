<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // Käytetään 'DOMContentLoaded' varmistamaan että DOM on valmis
    document.addEventListener('DOMContentLoaded', async () => {
        const SUPABASE_URL = 'https://zxtnhitxachrudrcrotk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dG5oaXR4YWNocnVkcmNyb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODEwOTUsImV4cCI6MjA4Nzg1NzA5NX0.DPXJlYDI2L8oLYo6ofyPJzQDTbXAhreJx7VsqhV7VdI';
        
        // TARKISTUS: Onko kirjasto latautunut?
        if (typeof supabase === 'undefined') {
            console.error("Supabase-kirjastoa ei löytynyt! Tarkista <script>-latauslinkki.");
            alert("Virhe järjestelmän latauksessa. Päivitä sivu.");
            return;
        }

        // ALUSTUS: Luodaan client oikein
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function tarkistaKayttaja() {
            try {
                const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
                
                if (authError || !user) {
                    console.log("Ei kirjautunutta käyttäjää");
                    window.location.href = 'login.html';
                    return;
                }

                console.log("Yritetään hakea profiilia sähköpostilla:", user.email);

                // Haetaan profiili. HUOM: Jos RLS on päällä, varmista että policy sallii tämän.
                const { data: profile, error: dbError } = await supabaseClient
                    .from('profiles')
                    .select('customer_group')
                    .eq('email', user.email) // .eq on varmempi jos sähköposti on tarkka
                    .single();

                if (dbError) {
                    console.error("Tietokantavirhe:", dbError.message);
                    alert("Tietokantavirhe: " + dbError.message);
                    window.location.href = 'login.html';
                    return;
                }

                if (!profile || profile.customer_group !== 'paid_customer') {
                    console.warn("Käyttäjä löytyi, mutta ryhmä ei ole paid_customer. Ryhmä oli:", profile?.customer_group);
                    alert("Pääsy evätty. Sähköpostiasi ei löydy maksettujen asiakkaiden listalta.");
                    await supabaseClient.auth.signOut();
                    window.location.href = 'login.html';
                } else {
                    console.log("Pääsy sallittu!");
                    // Näytetään sisältö
                    document.body.style.display = 'block';
                    const emailElement = document.getElementById('user-email');
                    if (emailElement) emailElement.innerText = user.email;
                }
            } catch (e) {
                console.error("Odottamaton virhe:", e);
                window.location.href = 'login.html';
            }
        }

        // Globaali funktio uloskirjautumiselle
        window.uloskirjautuminen = async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        // Suoritetaan tarkistus
        await tarkistaKayttaja();

        // Lomakkeen käsittely
        const form = document.getElementById('haku-form');
        if (form) {
            form.onsubmit = async (e) => {
                e.preventDefault();
                
                const statusElem = document.getElementById('status');
                const downloadArea = document.getElementById('download-area');
                const btn = document.getElementById('submit-btn');
                const emailElem = document.getElementById('user-email');

                if (statusElem) statusElem.classList.remove('hidden');
                if (downloadArea) downloadArea.classList.add('hidden');
                if (btn) {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                }

                const formData = new FormData();
                formData.append('cv', document.getElementById('cv-tiedosto').files[0]);
                formData.append('ilmoitus', document.getElementById('ilmoitus-teksti').value);
                formData.append('user_email', emailElem ? emailElem.innerText : '');

                try {
                    const response = await fetch('https://n8nscalera.eu/webhook/uusi-hakemus', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (!response.ok) throw new Error("Palvelinvirhe");
                    
                    const result = await response.json();
                    if (result.downloadUrl) {
                        const dlLink = document.getElementById('download-link');
                        if (dlLink) dlLink.href = result.downloadUrl;
                        if (downloadArea) downloadArea.classList.remove('hidden');
                    }
                } catch (err) {
                    alert('Yhteysvirhe AI-palvelimeen: ' + err.message);
                } finally {
                    if (statusElem) statusElem.classList.add('hidden');
                    if (btn) {
                        btn.disabled = false;
                        btn.style.opacity = '1';
                    }
                }
            };
        }
    });
</script>
