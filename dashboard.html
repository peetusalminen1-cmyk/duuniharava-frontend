<script>
    window.addEventListener('load', async () => {
        const SUPABASE_URL = 'https://zxtnhitxachrudrcrotk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dG5oaXR4YWNocnVkcmNyb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODEwOTUsImV4cCI6MjA4Nzg1NzA5NX0.DPXJlYDI2L8oLYo6ofyPJzQDTbXAhreJx7VsqhV7VdI';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function tarkistaKayttaja() {
            const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
            
            if (authError || !user) {
                console.log("Ei kirjautunutta käyttäjää");
                window.location.href = 'login.html';
                return;
            }

            console.log("Yritetään hakea profiilia sähköpostilla:", user.email);

            // KORJAUS: Käytetään .ilike (case-insensitive) ja katsotaan mitä virhe sanoo
            const { data: profile, error: dbError } = await supabaseClient
                .from('profiles')
                .select('customer_group')
                .ilike('email', user.email) 
                .single();

            if (dbError) {
                console.error("Tietokantavirhe:", dbError.message);
                alert("Tietokantavirhe: " + dbError.message);
                window.location.href = 'login.html';
                return;
            }

            if (!profile || profile.customer_group !== 'paid_customer') {
                console.warn("Käyttäjä löytyi, mutta ryhmä ei ole paid_customer. Ryhmä oli:", profile?.customer_group);
                alert("Pääsy evätty. Sähköpostiasi ei löydy maksettujen asiakkaiden listalta.");
                await supabaseClient.auth.signOut();
                window.location.href = 'login.html';
            } else {
                console.log("Pääsy sallittu!");
                document.body.style.display = 'block';
                document.getElementById('user-email').innerText = user.email;
            }
        }

        window.uloskirjautuminen = async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        await tarkistaKayttaja();

        // Lomakkeen käsittely (n8n)
        const form = document.getElementById('haku-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('download-area').classList.add('hidden');
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.style.opacity = '0.5';

            const formData = new FormData();
            formData.append('cv', document.getElementById('cv-tiedosto').files[0]);
            formData.append('ilmoitus', document.getElementById('ilmoitus-teksti').value);
            formData.append('user_email', document.getElementById('user-email').innerText);

            try {
                const response = await fetch('https://n8nscalera.eu/webhook/uusi-hakemus', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.downloadUrl) {
                    document.getElementById('download-link').href = result.downloadUrl;
                    document.getElementById('download-area').classList.remove('hidden');
                }
            } catch (err) {
                alert('Yhteysvirhe AI-palvelimeen.');
            } finally {
                document.getElementById('status').classList.add('hidden');
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        };
    });
</script>
