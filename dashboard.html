<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duuniharava | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0B0B0B; color: #FFFFFF; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        .glass:hover { border-color: rgba(0,191,166,0.4); }
        .turkoosi-text { color: #00BFA6; }
        .oranssi-text { color: #FF6F3C; }
        .btn-primary { background: #00BFA6; color: #000; font-weight: bold; }
        .btn-outline { border: 1px solid #FFFFFF; color: #FFFFFF; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .upload-area { border: 2px dashed rgba(255,255,255,0.15); border-radius: 1rem; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .upload-area:hover { border-color: #00BFA6; background: rgba(0,191,166,0.04); }
        .upload-area.has-file { border-color: #00BFA6; border-style: solid; background: rgba(0,191,166,0.06); }
        .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

        .step { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; background: rgba(255,255,255,0.03); font-size: 13px; color: rgba(255,255,255,0.4); transition: all 0.3s; }
        .step.active { background: rgba(0,191,166,0.1); color: #00BFA6; }
        .step.done { background: rgba(0,191,166,0.08); color: #00BFA6; }
        .step.error { background: rgba(255,111,60,0.1); color: #FF6F3C; }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); flex-shrink: 0; transition: background 0.3s; }
        .step.active .step-dot { background: #00BFA6; animation: pulse 1s infinite; }
        .step.done .step-dot { background: #00BFA6; }
        .step.error .step-dot { background: #FF6F3C; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

        .score-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
        .score-fill { height: 100%; background: #00BFA6; border-radius: 3px; transition: width 1.2s cubic-bezier(0.34,1.56,0.64,1); }
        .report-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1rem; font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.7; white-space: pre-wrap; max-height: 280px; overflow-y: auto; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .modal-box { background: #111; border: 1px solid rgba(0,191,166,0.3); border-radius: 2rem; padding: 2rem; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }

        input[type="text"], select { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; color: #fff; width: 100%; outline: none; }
        input[type="text"]:focus, select:focus { border-color: #00BFA6; }

        .checkbox-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; }
        .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #00BFA6; }
        .field-label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; display: block; margin-bottom: 6px; }
        .section-title { font-size: 11px; font-weight: 700; color: #00BFA6; text-transform: uppercase; margin-bottom: 10px; }
        .section-divider { border-top: 1px solid rgba(255,255,255,0.06); margin: 1rem 0; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-16">
        <div class="text-xl font-bold tracking-tighter flex items-center gap-2">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00BFA6" stroke-width="2.5" stroke-linecap="round"><path d="M5 11V20M12 11V20M19 11V20M5 11H19M12 4V11"/></svg>
            <span class="turkoosi-text">DUUNI</span><span class="oranssi-text">HARAVA</span>
        </div>
        <button onclick="logout()" class="text-xs font-bold border border-red-500/50 text-red-500 px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">
            KIRJAUDU ULOS
        </button>
    </nav>

    <main class="max-w-4xl mx-auto">
        <div class="glass p-8 rounded-[2.5rem] mb-12">
            <h1 class="text-3xl font-bold mb-2">Tervetuloa takaisin!</h1>
            <p class="text-gray-500 font-mono text-sm">Käyttäjä: <span id="user-email" class="text-gray-300">ladataan...</span></p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="glass p-8 rounded-[2.5rem] flex flex-col justify-between">
                <div>
                    <h3 class="text-xl font-bold mb-2">1. Optimoi CV</h3>
                    <p class="text-gray-400 text-sm mb-6">Tekoäly analysoi CV:si ja kirjoittaa parannellun version.</p>

                    <div class="upload-area mb-5" id="uploadArea">
                        <input type="file" id="cv-upload" accept=".pdf,.doc,.docx" onchange="handleFileChange(this)">
                        <p class="text-sm text-gray-400">Vedä CV tähän tai klikkaa</p>
                        <p class="text-sm font-bold turkoosi-text mt-2 hidden" id="fileName"></p>
                    </div>

                    <div id="extraFields" class="hidden space-y-4">
                        <div class="section-title">Perustiedot</div>
                        <input type="text" id="targetJobs" placeholder="Mihin töihin haet?">
                        <select id="education">
                            <option value="">Koulutustaso...</option>
                            <option value="AMK">AMK</option>
                            <option value="Yliopisto">Yliopisto</option>
                            <option value="Ammattikoulu">Ammattikoulu</option>
                        </select>
                        <select id="experience">
                            <option value="">Kokemus...</option>
                            <option value="1-3v">1-3 vuotta</option>
                            <option value="3-10v">3-10 vuotta</option>
                        </select>
                        <hr class="section-divider">
                        <div class="checkbox-row"><input type="checkbox" id="drivingLicense"><label>B-ajokortti</label></div>
                        <div class="checkbox-row"><input type="checkbox" id="hygienia"><label>Hygieniapassi</label></div>
                    </div>
                </div>

                <button onclick="aloitaCVOptimointi()" id="cvBtn"
                    class="btn-primary py-4 px-6 rounded-2xl transition mt-6 opacity-50 cursor-not-allowed"
                    disabled>
                    LATAA JA OPTIMOI
                </button>
            </div>

            <div class="glass p-8 rounded-[2.5rem] flex flex-col justify-between border-purple-500/20">
                <div>
                    <h3 class="text-xl font-bold mb-2 text-white">2. Aktivoi Haku</h3>
                    <p class="text-gray-400 text-sm mb-8">Käynnistä automaattinen hakuprosessi.</p>
                </div>
                <button id="hakuBtn" onclick="aktivoiHaku()" class="btn-outline py-4 px-6 rounded-2xl hover:bg-white hover:text-black transition">
                    KÄYNNISTÄ HAKU
                </button>
            </div>
        </div>
    </main>

    <div class="modal-overlay hidden" id="resultModal">
        <div class="modal-box">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold turkoosi-text">CV-kuntotarkastus</h3>
                <button onclick="suljeModaali()" class="text-gray-500 hover:text-white transition text-2xl">&times;</button>
            </div>
            <div id="progressSection" class="space-y-2 mb-6">
                <div class="step" id="ms1"><div class="step-dot"></div><span>Lähetetään tiedosto...</span></div>
                <div class="step" id="ms2"><div class="step-dot"></div><span>Analysoidaan...</span></div>
            </div>
            <div id="resultSection" class="hidden">
                <div class="mb-4">
                    <span class="text-3xl font-bold turkoosi-text" id="scoreNum">0/100</span>
                    <div class="score-track mt-2"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
                </div>
                <div class="report-box mb-4" id="reportBox"></div>
                <button onclick="suljeModaali()" class="w-full py-3 rounded-xl border border-white/10 text-gray-400">Sulje</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zxtnhitxachrudrcrotk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dG5oaXR4YWNocnVkcmNyb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODEwOTUsImV4cCI6MjA4Nzg1NzA5NX0.DPXJlYDI2L8oLYo6ofyPJzQDTbXAhreJx7VsqhV7VdI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkUser() {
            const { data: { user }, error } = await supabaseClient.auth.getUser();
            if (error || !user) { window.location.href = 'index.html'; }
            else { document.getElementById('user-email').innerText = user.email; }
        }

        function handleFileChange(input) {
            if (input.files && input.files[0]) {
                document.getElementById('uploadArea').classList.add('has-file');
                document.getElementById('fileName').textContent = input.files[0].name;
                document.getElementById('fileName').classList.remove('hidden');
                document.getElementById('extraFields').classList.remove('hidden');
                const btn = document.getElementById('cvBtn');
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        async function aloitaCVOptimointi() {
            const fileInput = document.getElementById('cv-upload');
            const btn = document.getElementById('cvBtn'); // Haetaan ID:llä varmuuden vuoksi
            if (!fileInput.files[0] || !btn) return;

            const { data: { user } } = await supabaseClient.auth.getUser();
            btn.disabled = true;
            btn.innerText = "KÄSITELLÄÄN...";

            document.getElementById('resultModal').classList.remove('hidden');
            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('resultSection').classList.add('hidden');
            
            const formData = new FormData();
            formData.append('cv', fileInput.files[0]);
            formData.append('email', user.email);
            formData.append('targetJobs', document.getElementById('targetJobs').value);

            try {
                const response = await fetch('https://n8nscalera.eu/webhook/uusi-hakemus', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                naytaTulos(data);
            } catch (err) {
                alert('Virhe lähetyksessä.');
            } finally {
                btn.disabled = false;
                btn.innerText = "LATAA JA OPTIMOI";
            }
        }

        function naytaTulos(data) {
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            const report = data.ai_report || 'Analyysi valmis.';
            document.getElementById('reportBox').textContent = report;
            document.getElementById('scoreNum').textContent = "85/100";
            document.getElementById('scoreFill').style.width = "85%";
        }

        function suljeModaali() { document.getElementById('resultModal').classList.add('hidden'); }
        async function logout() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; }

        checkUser();
    </script>
</body>
</html>
