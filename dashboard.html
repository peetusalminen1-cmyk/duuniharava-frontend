<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duuniharava | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0B0B0B; color: #FFFFFF; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        .glass:hover { border-color: #00BFA6; }
        .turkoosi-text { color: #00BFA6; }
        .oranssi-text { color: #FF6F3C; }
        .btn-primary { background: #00BFA6; color: #000; font-weight: bold; border-radius: 12px; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .upload-area { border: 2px dashed rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 2rem; text-align: center; cursor: pointer; }
        .upload-area.has-file { border-color: #00BFA6; background: rgba(0,191,166,0.05); }
        
        input[type="text"], select { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; color: #fff; width: 100%; outline: none; }
        input[type="text"]:focus { border-color: #00BFA6; }
        
        .checkbox-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #ccc; }
        .checkbox-row input { width: 18px; height: 18px; accent-color: #00BFA6; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-box { background: #111; border: 1px solid #333; padding: 2.5rem; border-radius: 2rem; width: 100%; max-width: 500px; }
        
        .step { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; color: #666; }
        .step.active { color: #00BFA6; font-weight: bold; }
        .step.done { color: #00BFA6; opacity: 0.8; }
    </style>
</head>
<body class="min-h-screen p-6">

    <main class="max-w-4xl mx-auto">
        <div class="glass p-8 rounded-[2rem] mb-8">
            <h1 class="text-2xl font-bold">Duuniharava Dashboard</h1>
            <p class="text-gray-500 text-sm mt-1" id="user-display">Ladataan käyttäjää...</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="glass p-8 rounded-[2.5rem] flex flex-col">
                <h3 class="text-xl font-bold mb-4">1. Optimoi Profiili</h3>
                
                <div class="upload-area mb-6" id="uploadArea">
                    <input type="file" id="cv-upload" class="hidden" accept=".pdf,.doc,.docx" onchange="handleFileChange(this)">
                    <label for="cv-upload" class="cursor-pointer">
                        <p class="text-sm text-gray-400" id="uploadText">Klikkaa ja valitse CV (PDF)</p>
                        <p class="text-sm font-bold turkoosi-text hidden" id="fileName"></p>
                    </label>
                </div>

                <div id="extraFields" class="space-y-4 mb-6 hidden">
                    <div>
                        <label class="text-[10px] uppercase text-gray-500 font-bold">Mihin töihin haet?</label>
                        <input type="text" id="targetJobs" placeholder="Esim. Logistiikka, Myynti...">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="checkbox-row"><input type="checkbox" id="drivingLicense"><label>Ajokortti (B)</label></div>
                        <div class="checkbox-row"><input type="checkbox" id="ownCar"><label>Oma auto</label></div>
                        <div class="checkbox-row"><input type="checkbox" id="hygienia"><label>Hygieniapassi</label></div>
                        <div class="checkbox-row"><input type="checkbox" id="trukki"><label>Trukkikortti</label></div>
                    </div>
                </div>

                <button onclick="lahetaBottiin(event)" id="cvBtn" class="btn-primary py-4 w-full opacity-50 cursor-not-allowed" disabled>
                    OPTIMOI JA ANALYSOI
                </button>
            </div>

            <div class="glass p-8 rounded-[2.5rem] flex flex-col justify-between border-purple-900/20">
                <div>
                    <h3 class="text-xl font-bold mb-2">2. Aktivoi Harava</h3>
                    <p class="text-gray-400 text-sm">Kun profiili on kunnossa, bitti alkaa etsiä sinulle töitä automaattisesti.</p>
                </div>
                <button onclick="aktivoiHaku(event)" class="btn-primary bg-white text-black hover:bg-gray-200 py-4 mt-8">
                    KÄYNNISTÄ HAKU
                </button>
            </div>
        </div>
    </main>

    <div id="loadingModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 class="text-xl font-bold mb-6 turkoosi-text">Käsitellään...</h3>
            <div class="space-y-4">
                <div id="s1" class="step">● Lähetetään tiedostoja</div>
                <div id="s2" class="step">● Tekoäly optimoi sisältöä</div>
                <div id="s3" class="step">● Luodaan raporttia</div>
            </div>
            <button onclick="document.getElementById('loadingModal').classList.add('hidden')" class="mt-8 text-gray-500 text-sm underline w-full">Sulje ikkuna</button>
        </div>
    </div>

    <script>
        // --- KONFIGURAATIO ---
        const SUPABASE_URL = 'https://zxtnhitxachrudrcrotk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dG5oaXR4YWNocnVkcmNyb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODEwOTUsImV4cCI6MjA4Nzg1NzA5NX0.DPXJlYDI2L8oLYo6ofyPJzQDTbXAhreJx7VsqhV7VdI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // n8n TUOTANTO-URLit
        const URL_CV_BOTTI = 'https://n8nscalera.eu/webhook/uusi-hakemus';
        const URL_HARAVA = 'https://n8nscalera.eu/webhook/dbf6d297-1d27-4d24-839d-bb98ebc87cc4';

        // --- TOIMINNOT ---

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('user-display').innerText = `Kirjautuneena: ${user.email}`;
        }

        function handleFileChange(input) {
            if (input.files && input.files[0]) {
                document.getElementById('uploadArea').classList.add('has-file');
                document.getElementById('fileName').innerText = input.files[0].name;
                document.getElementById('fileName').classList.remove('hidden');
                document.getElementById('uploadText').classList.add('hidden');
                document.getElementById('extraFields').classList.remove('hidden');
                document.getElementById('cvBtn').disabled = false;
                document.getElementById('cvBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        async function lahetaBottiin(e) {
            const btn = e.currentTarget;
            const fileInput = document.getElementById('cv-upload');
            const { data: { user } } = await supabaseClient.auth.getUser();

            document.getElementById('loadingModal').classList.remove('hidden');
            document.getElementById('s1').classList.add('active');

            const formData = new FormData();
            formData.append('cv', fileInput.files[0]);
            formData.append('email', user.email);
            formData.append('userId', user.id);
            formData.append('targetJobs', document.getElementById('targetJobs').value);
            formData.append('has_car', document.getElementById('ownCar').checked);
            formData.append('has_license', document.getElementById('drivingLicense').checked);

            try {
                const response = await fetch(URL_CV_BOTTI, {
                    method: 'POST',
                    body: formData // FormData asettaa Content-Typeksi multipart/form-data automaattisesti
                });

                if (response.ok) {
                    document.getElementById('s1').className = 'step done';
                    document.getElementById('s2').className = 'step active';
                    alert('CV lähetetty onnistuneesti! n8n aloittaa prosessoinnin.');
                } else {
                    throw new Error('Palvelin vastasi virheellä: ' + response.status);
                }
            } catch (err) {
                console.error(err);
                alert('Virhe lähetyksessä. Tarkista n8n CORS-asetukset ja että workflow on ACTIVE.');
            } finally {
                btn.innerText = 'OPTIMOI JA ANALYSOI';
                document.getElementById('loadingModal').classList.add('hidden');
            }
        }

        async function aktivoiHaku(e) {
            const btn = e.currentTarget;
            const { data: { user } } = await supabaseClient.auth.getUser();
            btn.innerText = 'AKTIVOIDAAN...';

            try {
                const res = await fetch(URL_HARAVA, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email, timestamp: new Date() })
                });
                if (res.ok) alert('Viikko-Harava käynnistetty!');
            } catch (err) {
                alert('Yhteysvirhe n8n-palvelimeen.');
            } finally {
                btn.innerText = 'KÄYNNISTÄ HAKU';
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        checkUser();
    </script>
</body>
</html>
