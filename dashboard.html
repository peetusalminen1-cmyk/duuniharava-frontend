<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 1. Supabase konfiguraatio (Käytä omia avaimiasi, jotka näkyvät Supabase Dashboardissa)
    const SUPABASE_URL = 'https://zxtnhitxachrudrcrotk.supabase.co';
    const SUPABASE_KEY = 'SINUN_ANON_PUBLIC_KEY'; // Hae tämä Supabase -> Project Settings -> API
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const n8nWebhookUrl = 'https://n8nscalera.eu/webhook/uusi-hakemus';

    async function handleOptimization() {
        // Haetaan kirjautunut käyttäjä
        const { data: { user } } = await supabase.auth.getUser();

        if (!user) {
            alert("Kirjaudu sisään ensin!");
            return;
        }

        // Muutetaan napin tila
        const btn = document.querySelector('.optimoitu-nappi'); // Varmista että luokka täsmää
        const originalText = btn.innerText;
        btn.innerText = "Käsitellään...";
        btn.disabled = true;

        try {
            const response = await fetch(n8nWebhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: user.email,
                    userId: user.id,
                    action: 'cv_optimization',
                    timestamp: new Date().toISOString()
                })
            });

            if (response.ok) {
                alert("CV:n optimointi aloitettu! n8n käsittelee pyyntöäsi.");
            } else {
                alert("Virhe n8n-yhteydessä.");
            }
        } catch (error) {
            console.error("Virhe:", error);
            alert("Jotain meni pieleen.");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    // Lisätään kuuntelija napille (Varmista että id tai class on oikein)
    document.addEventListener('DOMContentLoaded', () => {
        const startBtn = document.querySelector('button'); // Tai tarkempi valitsin
        if (startBtn) {
            startBtn.addEventListener('click', handleOptimization);
        }
    });
</script>
