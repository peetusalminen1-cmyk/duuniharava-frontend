<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 1. Supabase konfiguraatio antamallasi avaimella
    const SUPABASE_URL = 'https://zxtnhitxachrudrcrotk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dG5oaXR4YWNocnVkcmNyb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODEwOTUsImV4cCI6MjA4Nzg1NzA5NX0.DPXJlYDI2L8oLYo6ofyPJzQDTbXAhreJx7VsqhV7VdI';
    
    // Alustetaan client
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const n8nWebhookUrl = 'https://n8nscalera.eu/webhook/uusi-hakemus';

    async function handleOptimization(event) {
        if (event) event.preventDefault();

        // Haetaan kirjautunut käyttäjä
        const { data: { user }, error: userError } = await supabaseClient.auth.getUser();

        if (userError || !user) {
            alert("Kirjaudu sisään ensin!");
            console.error("Käyttäjävirhe:", userError);
            return;
        }

        // Napin visuaalinen palaute
        const btn = event.currentTarget;
        const originalText = btn.innerText;
        btn.innerText = "Käsitellään...";
        btn.disabled = true;

        try {
            // Lähetetään data n8n-webhookiin
            const response = await fetch(n8nWebhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                mode: 'no-cors', // Auttaa jos n8n päässä on CORS-rajoituksia
                body: JSON.stringify({
                    email: user.email,
                    userId: user.id,
                    action: 'cv_optimization',
                    timestamp: new Date().toISOString()
                })
            });

            alert("CV:n optimointipyyntö lähetetty onnistuneesti!");
            
        } catch (error) {
            console.error("Webhook-virhe:", error);
            alert("Yhteysvirhe n8n-palvelimeen.");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    // Lisätään tapahtumakuuntelija
    document.addEventListener('DOMContentLoaded', () => {
        // Etsitään nappi, joka käynnistää toiminnon
        // Voit vaihtaa tähän esim. id-valitsimen: document.getElementById('oma-nappi-id')
        const startBtn = document.querySelector('.optimoitu-nappi') || document.querySelector('button'); 
        
        if (startBtn) {
            startBtn.addEventListener('click', handleOptimization);
        }
    });
</script>
