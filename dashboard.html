<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Duuniharava</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0F0F0F; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .turkoosi-text { color: #00BFA6; }
        .oranssi-text { color: #FF6F3C; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div class="font-bold text-xl tracking-tighter">
                <span class="turkoosi-text">DUUNI</span><span class="oranssi-text">HARAVA</span>
            </div>
            <button id="logout-btn" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg transition">
                KIRJAUDU ULOS
            </button>
        </header>

        <div class="glass p-8 rounded-[2rem]">
            <h1 class="text-3xl font-bold mb-4">Tervetuloa takaisin!</h1>
            <p id="user-email" class="text-gray-400 mb-8 font-mono">Ladataan käyttäjää...</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-2xl border-l-4 border-[#00BFA6]">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-gray-500 mb-2">Aktiiviset haut</h3>
                    <p class="text-2xl font-bold">0 kpl</p>
                </div>
                <div class="glass p-6 rounded-2xl border-l-4 border-[#FF6F3C]">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-gray-500 mb-2">Uudet osumat</h3>
                    <p class="text-2xl font-bold">0 kpl</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Käytetään suoraan ikkunan globaalia supabase-oliota
        const config = {
            url: 'https://zxtnhitxachrudrcrotk.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dG5oaXR4YWNocnVkcmNyb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODEwOTUsImV4cCI6MjA4Nzg1NzA5NX0.DPXJlYDI2L8oLYo6ofyPJzQDTbXAhreJx7VsqhV7VdI'
        };

        const supabaseClient = supabase.createClient(config.url, config.key);

        async function initDashboard() {
            try {
                const { data: { session }, error } = await supabaseClient.auth.getSession();

                if (error || !session) {
                    console.log("Ei istuntoa, ohjataan kirjautumiseen...");
                    window.location.href = 'login.html';
                    return;
                }

                document.getElementById('user-email').innerText = "Käyttäjä: " + session.user.email;
                console.log("Dashboard ladattu käyttäjälle:", session.user.email);
            } catch (err) {
                console.error("Hups! Jotain meni pieleen:", err);
            }
        }

        // Logout-painikkeen toiminnallisuus
        document.getElementById('logout-btn').onclick = async function() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        };

        // Käynnistys
        initDashboard();
    </script>
</body>
</html>
