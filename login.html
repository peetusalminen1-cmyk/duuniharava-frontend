<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirjaudu | Duuniharava</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0F0F0F; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .turkoosi-text { color: #00BFA6; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="glass max-w-md w-full p-10 rounded-[2.5rem] border-t-4 border-[#00BFA6]">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tighter mb-2"><span class="turkoosi-text">DUUNI</span>HARAVA</h1>
            <p class="text-gray-400 text-sm">Kirjaudu sisään jatkaaksesi hakuja.</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2">Sähköposti</label>
                <input type="email" id="email" class="w-full glass p-4 rounded-xl focus:outline-none focus:border-[#00BFA6] text-white" required>
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2">Salasana</label>
                <input type="password" id="password" class="w-full glass p-4 rounded-xl focus:outline-none focus:border-[#00BFA6] text-white" required>
            </div>
            <button type="submit" id="auth-btn" class="w-full bg-[#00BFA6] text-black font-black py-4 rounded-xl hover:scale-105 transition uppercase tracking-widest text-xs mt-4">Kirjaudu sisään</button>
            <button type="button" id="signup-btn" class="w-full text-gray-500 text-[10px] uppercase font-bold tracking-widest hover:text-white transition">Tai luo uusi tili</button>
        </form>
    </div>

    <script>
        const config = {
            url: 'https://zxtnhitxachrudrcrotk.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dG5oaXR4YWNocnVkcmNyb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODEwOTUsImV4cCI6MjA4Nzg1NzA5NX0.DPXJlYDI2L8oLYo6ofyPJzQDTbXAhreJx7VsqhV7VdI'
        };
        const supabase = window.supabase.createClient(config.url, config.key);

        const form = document.getElementById('login-form');
        
        // Kirjautuminen
        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Virhe: " + error.message);
            else window.location.href = 'dashboard.html';
        };

        // Rekisteröityminen
        document.getElementById('signup-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) { alert("Täytä kentät ensin."); return; }

            const { error } = await supabase.auth.signUp({ email, password });
            if (error) alert("Virhe rekisteröinnissä: " + error.message);
            else alert("Vahvistusviesti lähetetty sähköpostiisi! (Tai voit yrittää kirjautua suoraan jos asetukset sallivat)");
        };
    </script>
</body>
</html>
