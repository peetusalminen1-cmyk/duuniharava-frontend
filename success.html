<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viimeistele tilauksesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #00BFA6 0%, #0080ff 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full glass p-10 rounded-[2.5rem] shadow-2xl border-t-2 border-[#00BFA6] text-center">
        <div class="mb-6 flex justify-center">
            <div class="w-16 h-16 bg-[#00BFA6]/20 rounded-full flex items-center justify-center text-[#00BFA6] text-3xl font-bold">
                ✓
            </div>
        </div>
        
        <h1 class="text-2xl font-black mb-2">Maksu onnistui!</h1>
        <p class="text-gray-400 text-sm mb-8">Luo nyt salasanasi, jotta pääset käsiksi ostamaasi sisältöön.</p>

        <form id="signup-form" class="space-y-4 text-left">
            <div>
                <label class="block text-[10px] font-bold mb-2 uppercase tracking-widest text-gray-500">Sähköposti</label>
                <input type="email" id="email" required class="w-full glass p-4 rounded-xl focus:outline-none focus:border-[#00BFA6] transition text-sm text-white">
            </div>
            <div>
                <label class="block text-[10px] font-bold mb-2 uppercase tracking-widest text-gray-500">Valitse Salasana</label>
                <input type="password" id="password" required minlength="6" class="w-full glass p-4 rounded-xl focus:outline-none focus:border-[#00BFA6] transition text-sm text-white">
            </div>
            <button type="submit" id="submit-btn" class="w-full gradient-bg text-white font-black py-4 rounded-xl hover:scale-[1.02] active:scale-95 transition shadow-lg mt-4">
                LUO TILI JA JATKA ➔
            </button>
        </form>
    </div>

    <script>
        // Supabase-asetukset (Muista vaihtaa omat avaimesi!)
        const supabaseUrl = 'SINUN_SUPABASE_URL';
        const supabaseKey = 'SINUN_SUPABASE_ANON_KEY';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const signupForm = document.getElementById('signup-form');
        const submitBtn = document.getElementById('submit-btn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.innerText = "LUODAAN TILIÄ...";

            // Rekisteröidään käyttäjä ja lisätään "paid_customer" metadataan
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        source: 'paid_customer',
                        status: 'active'
                    }
                }
            });

            if (error) {
                alert("Virhe: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "LUO TILI JA JATKA ➔";
            } else {
                alert("Tili luotu onnistuneesti! Voit nyt kirjautua sisään.");
                // Ohjataan takaisin pääsivulle kirjautumista varten
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
