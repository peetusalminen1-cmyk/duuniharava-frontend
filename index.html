<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duuniharava | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0B0B0B; color: #FFFFFF; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .glass:hover { border-color: rgba(0, 191, 166, 0.4); }
        .turkoosi-text { color: #00BFA6; }
        .oranssi-text { color: #FF6F3C; }
        .btn-primary { background: #00BFA6; color: #000; font-weight: bold; }
        .btn-outline { border: 1px solid #FFFFFF; color: #FFFFFF; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .upload-area { border: 2px dashed rgba(255,255,255,0.15); border-radius: 1rem; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .upload-area:hover { border-color: #00BFA6; background: rgba(0,191,166,0.04); }
        .upload-area.has-file { border-color: #00BFA6; border-style: solid; background: rgba(0,191,166,0.06); }
        .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

        .step { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; background: rgba(255,255,255,0.03); font-size: 13px; color: rgba(255,255,255,0.4); transition: all 0.3s; }
        .step.active { background: rgba(0,191,166,0.1); color: #00BFA6; }
        .step.done { background: rgba(0,191,166,0.08); color: #00BFA6; }
        .step.error { background: rgba(255,111,60,0.1); color: #FF6F3C; }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); flex-shrink: 0; transition: background 0.3s; }
        .step.active .step-dot { background: #00BFA6; animation: pulse 1s infinite; }
        .step.done .step-dot { background: #00BFA6; }
        .step.error .step-dot { background: #FF6F3C; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

        .score-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
        .score-fill { height: 100%; background: #00BFA6; border-radius: 3px; transition: width 1.2s cubic-bezier(0.34,1.56,0.64,1); }

        .report-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1rem; font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.7; white-space: pre-wrap; max-height: 260px; overflow-y: auto; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .modal-box { background: #111; border: 1px solid rgba(0,191,166,0.3); border-radius: 2rem; padding: 2rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }

        input[type="text"], input[type="email"] { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus, input[type="email"]:focus { border-color: #00BFA6; }
        input::placeholder { color: rgba(255,255,255,0.25); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-16">
        <div class="text-xl font-bold tracking-tighter flex items-center gap-2">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00BFA6" stroke-width="2.5" stroke-linecap="round"><path d="M5 11V20M12 11V20M19 11V20M5 11H19M12 4V11"/></svg>
            <span class="turkoosi-text">DUUNI</span><span class="oranssi-text">HARAVA</span>
        </div>
        <button onclick="logout()" class="text-xs font-bold border border-red-500/50 text-red-500 px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">
            KIRJAUDU ULOS
        </button>
    </nav>

    <main class="max-w-4xl mx-auto">
        <div class="glass p-8 rounded-[2.5rem] mb-12">
            <h1 class="text-3xl font-bold mb-2">Tervetuloa takaisin!</h1>
            <p class="text-gray-500 font-mono text-sm">Käyttäjä: <span id="user-email" class="text-gray-300">ladataan...</span></p>
        </div>

        <h2 class="text-xs font-bold tracking-[0.2em] text-gray-500 uppercase mb-8">Viikon Haravointi</h2>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="glass p-8 rounded-[2.5rem] flex flex-col justify-between">
                <div>
                    <h3 class="text-xl font-bold mb-2">1. Optimoi CV</h3>
                    <p class="text-gray-400 text-sm mb-6">Tekoäly analysoi CV:si, antaa kuntotarkastuksen ja kirjoittaa parannellun version Google Docsiin.</p>

                    <div class="upload-area mb-4" id="uploadArea">
                        <input type="file" id="cv-upload" accept=".pdf,.doc,.docx" onchange="handleFileChange(this)">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" class="mx-auto mb-2"><rect x="4" y="2" width="20" height="24" rx="3"/><path d="M9 2v7h10"/><path d="M14 17v-5M12 14l2-2 2 2"/></svg>
                        <p class="text-sm text-gray-400">Vedä CV tähän tai klikkaa</p>
                        <p class="text-xs text-gray-600 mt-1">PDF, DOC tai DOCX</p>
                        <p class="text-sm font-bold turkoosi-text mt-2 hidden" id="fileName"></p>
                    </div>

                    <div id="extraFields" class="hidden space-y-3 mb-4">
                        <div>
                            <label class="text-xs text-gray-500 uppercase tracking-wider block mb-1">Suurin saavutuksesi / Supervoima</label>
                            <input type="text" id="achievements" placeholder="Esim. Jääkiekon kilpataso...">
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 uppercase tracking-wider block mb-1">Tavoiteltu rooli</label>
                            <input type="text" id="targetRole" placeholder="Esim. Logistiikka-alan ammattilainen">
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 uppercase tracking-wider block mb-1">Hallitsemasi työkalut</label>
                            <input type="text" id="tools" placeholder="Esim. Excel, Slack, Microsoft Office...">
                        </div>
                    </div>
                </div>

                <button onclick="aloitaCVOptimointi(event)" id="cvBtn" class="btn-primary py-4 px-6 rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition mt-4 opacity-50 cursor-not-allowed" disabled>
                    LATAA JA OPTIMOI
                </button>
            </div>

            <div class="glass p-8 rounded-[2.5rem] flex flex-col justify-between">
                <div>
                    <h3 class="text-xl font-bold mb-2 text-white">2. Aktivoi Haku</h3>
                    <p class="text-gray-400 text-sm mb-8">Seuraa n8n-botin tekemiä hakem
